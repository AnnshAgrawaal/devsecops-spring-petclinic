name: Security pipeline

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run full scan nightly at 02:00 UTC so DAST doesn't slow every push
    - cron: "0 2 * * *"

env:
  JAVA_VERSION: "21"

# Prevent concurrent runs on the same branch (cancel the older one)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — BUILD & UNIT TEST
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and run unit tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

      - name: Upload Surefire test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — SEMGREP SAST
  # Runs Semgrep with Java, Spring, and OWASP Top 10 rulesets.
  # Uploads findings as SARIF to GitHub Code Scanning.
  # Also runs OWASP Dependency-Check for known CVEs in pom.xml.
  # ─────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep + Dependency-Check)
    runs-on: ubuntu-22.04
    needs: build

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── Semgrep ──────────────────────────────────────────────
      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Run Semgrep (OSS rulesets + custom rules)
        run: |
          semgrep scan \
            --config p/java \
            --config p/owasp-top-ten \
            --config p/spring \
            --config semgrep/custom-rules.yml \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            --quiet

      - name: Upload Semgrep SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 30

      # ── OWASP Dependency-Check ────────────────────────────────
      - name: Run OWASP Dependency-Check
        run: |
          mvn --batch-mode --no-transfer-progress \
            org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformats=JSON,HTML \
            -DsuppressionFile=dependency-check-suppression.xml \
            || true

      - name: Fail if CVSS >= 7 found in dependencies
        run: |
          VULN_COUNT=$(python3 -c "
          import json, sys
          with open('target/dependency-check-report.json') as f:
              data = json.load(f)
          high = [
              v for d in data.get('dependencies', [])
              for v in d.get('vulnerabilities', [])
              if float(v.get('cvssv3', {}).get('baseScore', 0) or
                       v.get('cvssv2', {}).get('score', 0)) >= 7
          ]
          print(len(high))
          ")
          echo "High/Critical dependency CVEs found: $VULN_COUNT"
          if [ "$VULN_COUNT" -gt "0" ]; then
            echo "Pipeline blocked: dependency CVEs at CVSS >= 7"
            exit 1
          fi

      - name: Upload Dependency-Check HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — CODEQL (deep dataflow analysis)
  # Runs on PRs and nightly schedule only — too slow for every push.
  # ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL dataflow analysis
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: Build for CodeQL (autobuild)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-java

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — DAST (OWASP ZAP)
  # Builds the app image, starts it with docker-compose, then runs
  # an authenticated ZAP full scan directly against the running app.
  # Depends on sast — only runs if SAST passes cleanly.
  # ─────────────────────────────────────────────────────────────
  dast:
    name: DAST (OWASP ZAP authenticated)
    runs-on: ubuntu-22.04
    needs: sast

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build Docker image
        run: |
          docker build \
            --tag petclinic:latest \
            --file Dockerfile \
            .

      - name: Start application with docker-compose
        run: |
          docker-compose up -d
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "App is ready after $((i * 2))s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/actuator/health || \
            (docker-compose logs && exit 1)

      - name: Run ZAP authenticated full scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://localhost:8080"
          context_file: zap/auth.yaml
          rules_file_name: zap/rules.tsv
          cmd_options: >
            -config scanner.attackStrength=HIGH
            -config ajaxSpider.enabled=true
            -config ajaxSpider.maxDuration=2
          allow_issue_writing: false

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30

      - name: Upload ZAP SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report_sarif.sarif
          category: zap-dast
        continue-on-error: true

      - name: Tear down app
        if: always()
        run: docker-compose down
